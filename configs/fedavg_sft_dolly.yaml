task: sft
output_dir: outputs/fedavg_sft_dolly
seed: 42

model:
  model_name_or_path: gpt2
  tokenizer_name_or_path: gpt2
  trust_remote_code: false
  torch_dtype: float32
  use_flash_attn: false
  gradient_checkpointing: false

peft:
  method: lora
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - c_attn
    - c_proj
  adapter_name: default

federated:
  algorithm: fedavg
  num_clients: 4
  clients_per_round: 2
  rounds: 3
  local_epochs: 1
  local_steps: 10
  sample_mode: uniform
  gpu_ids: [1, 2, 3]
  max_parallel_clients: null

data:
  task: sft
  source: hf
  dataset_name: databricks/databricks-dolly-15k
  dataset_split: train
  partitioner: iid
  partition_seed: 42
  max_samples: 2000

eval:
  eval_every: 1
  save_every: 1
  evaluator_type: alpaca_eval
  alpaca_eval_model_name: fedpost_sft_model
  run_lm_eval: true
  lm_eval_tasks:
    - hellaswag
    - piqa

sft:
  max_length: 256
  lr: 1.0e-4
  batch_size: 2
  grad_accum_steps: 1
