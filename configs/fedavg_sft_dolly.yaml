task: sft
output_dir: outputs/fedavg_sft_dolly
seed: 42

model:
  model_name_or_path: gpt2
  tokenizer_name_or_path: gpt2
  trust_remote_code: false
  torch_dtype: float32
  use_flash_attn: false
  gradient_checkpointing: false

peft:
  method: lora
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - c_attn
    - c_proj
  adapter_name: default

federated:
  algorithm: fedavg
  num_clients: 4
  clients_per_round: 2
  proportion: null
  rounds: 3
  num_rounds: null
  local_epochs: 1
  num_epochs: null
  local_steps: 10
  num_steps: null
  sample_mode: uniform
  client_execution: thread
  mp_start_method: spawn
  gpu_ids: [1, 2, 3]
  max_parallel_clients: null
  early_stop_metric: null
  early_stop_mode: max
  early_stop_patience: null
  early_stop_min_delta: 0.0

data:
  task: sft
  source: hf
  dataset_name: databricks/databricks-dolly-15k
  dataset_split: train
  partitioner: iid
  partition_seed: 42
  max_samples: 2000

eval:
  eval_every: 1
  save_every: 1
  evaluator_type: sft
  save_adapter_every: 1
  merge_every: null
  eval_requires_merged_model: true
  eval_device: cuda:0
  fail_on_eval_error: false

  run_alpaca_eval: true
  alpaca_eval_model_name: fedpost_sft_model
  alpaca_eval_annotators_config: alpaca_eval_gpt4_turbo_fn

  run_lm_eval: true
  lm_eval_tasks:
    - hellaswag
    - piqa
  lm_eval_batch_size: auto
  lm_eval_device: cuda:0

  eval_generation_max_new_tokens: 128
  summary_primary_metric: eval/lm_eval/hellaswag/acc_norm

sft:
  max_length: 256
  lr: 1.0e-4
  learning_rate: null
  batch_size: 2
  grad_accum_steps: 1
  optimizer: adamw
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: null
  lr_scheduler: constant
  learning_rate_decay: 1.0
  warmup_steps: 0
  warmup_ratio: 0.0
