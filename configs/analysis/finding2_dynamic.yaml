# Finding2 Part B dynamic downstream template.
# This file records the intended defaults. The current runner is CLI-based.

protocol: finding2_part_b_dynamic_downstream
semantics: all_lora_trainable_activation_substitution

defaults:
  model_name_or_path: modelscope/LLM-Research/Meta-Llama-3___1-8B
  train_dataset_name: tatsu-lab/alpaca
  train_dataset_config: null
  train_split: train
  eval_dataset_name: tatsu-lab/alpaca
  eval_dataset_config: null
  eval_split: train
  train_samples: 128
  eval_samples: 64
  max_length: 512
  batch_size: 1
  train_steps: 20
  learning_rate: 1.0e-4
  weight_decay: 0.0
  seed: 42
  dtype: bfloat16
  device: null
  device_map: auto
  trust_remote_code: false
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  lora_target_modules: null
  adapter_name: default
  calibration_vectors: 2000
  allow_small_calibration: false
  synthesizer: S5_anchor_correction
  s5_rank: 64
  s5_top_k: 64
  layer_idx: 16

experiments:
  - name: llama3_8b__alpaca__layer16__s5
    hidden_trace_path: outputs/residual_stream/llama3_8b__alpaca/hidden_states.pt
    output_dir: outputs/finding2/dynamic_downstream/llama3_8b__alpaca__layer16__s5

# Quick smoke example:
#   python -m fedpost.analysis.finding2.dynamic_downstream \
#     --model_name_or_path modelscope/LLM-Research/Meta-Llama-3___1-8B \
#     --hidden_trace_path outputs/residual_stream/llama3_8b__alpaca/hidden_states.pt \
#     --output_dir outputs/finding2/dynamic_downstream/llama3_8b__alpaca_quick \
#     --layer_idx 16 \
#     --synthesizer S5_anchor_correction \
#     --quick
#
# Notes:
# - Full runs keep allow_small_calibration=false so missing calibration data fails loudly.
# - --quick enables small calibration automatically and records requested/used counts in JSON.
