defaults:
  output_root: outputs/residual_stream
  num_samples: 512
  max_length: 2048
  seed: 42
  dtype: bfloat16
  trust_remote_code: false
  use_flash_attn: false
  device: null
  device_map: auto
  capture_mode: auto
  downsample_hidden: null
  projection_seed: 1234
  random_pairs: 2000
  metrics_batch_size: 8
  random_pair_batch: 64
  eps: 1.0e-12

models:
  - name: llama3_8b
    model_name_or_path: modelscope/LLM-Research/Meta-Llama-3___1-8B
  - name: qwen2_7b
    model_name_or_path: Qwen/Qwen2-7B
    trust_remote_code: true
  - name: mistral_7b
    model_name_or_path: mistralai/Mistral-7B-v0.1

datasets:
  - name: alpaca
    dataset_kind: alpaca
    dataset_name: tatsu-lab/alpaca
    dataset_split: train
  - name: gsm8k
    dataset_kind: gsm8k
    dataset_name: openai/gsm8k
    dataset_config: main
    dataset_split: train
  - name: mmlu
    dataset_kind: mmlu
    dataset_name: cais/mmlu
    dataset_config: all
    dataset_split: test

# The runner expands models x datasets into 9 experiments when `experiments` is omitted.
# Example:
#   python -m fedpost.analysis.hidden_states.run_residual_stream \
#     --config configs/analysis/residual_stream.yaml \
#     --experiment_name llama3_8b__alpaca \
#     --dry_run
