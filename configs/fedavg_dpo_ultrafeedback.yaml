task: dpo
output_dir: outputs/fedavg_dpo_ultrafeedback
seed: 42

model:
  model_name_or_path: gpt2
  tokenizer_name_or_path: gpt2
  trust_remote_code: false
  torch_dtype: float32
  use_flash_attn: false
  gradient_checkpointing: false

peft:
  method: lora
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - c_attn
    - c_proj
  adapter_name: default

federated:
  algorithm: fedavg
  num_clients: 4
  clients_per_round: 2
  rounds: 3
  local_epochs: 1
  local_steps: 10
  sample_mode: uniform

data:
  task: dpo
  source: hf
  dataset_name: HuggingFaceH4/ultrafeedback_binarized
  dataset_split: train_prefs
  partitioner: iid
  partition_seed: 42
  max_samples: 2000

eval:
  eval_every: 1
  save_every: 1
  evaluator_type: dpo_combo
  run_alpaca_eval: true
  run_mt_bench: false
  run_lm_eval: true
  lm_eval_tasks:
    - hellaswag
    - piqa

dpo:
  max_length: 256
  max_prompt_length: 128
  lr: 1.0e-5
  batch_size: 1
  grad_accum_steps: 1
  beta: 0.1
  reference_mode: frozen_copy